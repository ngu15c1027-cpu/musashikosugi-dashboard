<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>リベ大デンタルクリニック武蔵小杉院 | 経営レポート</title>
<style>
:root {
  --primary: #0d6e6e;
  --primary-light: #e6f5f5;
  --primary-dark: #094d4d;
  --accent: #f0a050;
  --accent-light: #fff7ed;
  --bg: #f7fafa;
  --card: #ffffff;
  --text: #2d3a3a;
  --text-light: #6b7f7f;
  --border: #dce8e8;
  --success: #16a34a;
  --warning: #d97706;
  --shadow: 0 1px 6px rgba(0,0,0,0.06);
  --radius: 14px;
}

* { margin: 0; padding: 0; box-sizing: border-box; }
html { scroll-behavior: smooth; }

body {
  font-family: -apple-system, BlinkMacSystemFont, 'Hiragino Kaku Gothic ProN', 'Noto Sans JP', sans-serif;
  background: var(--bg);
  color: var(--text);
  line-height: 1.8;
  font-size: 15px;
}

/* ---- Header ---- */
.header {
  background: linear-gradient(135deg, #0d6e6e 0%, #148f8f 50%, #1aadad 100%);
  color: white;
  padding: 48px 24px 40px;
  position: relative;
}
.header::after {
  content: '';
  position: absolute;
  bottom: -20px; left: 0; right: 0;
  height: 40px;
  background: var(--bg);
  border-radius: 20px 20px 0 0;
}
.header-inner { max-width: 900px; margin: 0 auto; }
.header-badge {
  display: inline-block;
  background: rgba(255,255,255,0.15);
  border: 1px solid rgba(255,255,255,0.3);
  padding: 4px 16px;
  border-radius: 100px;
  font-size: 12px;
  margin-bottom: 16px;
}
.header h1 {
  font-size: clamp(22px, 4vw, 34px);
  font-weight: 800;
  line-height: 1.3;
  margin-bottom: 8px;
}
.header p { font-size: 15px; opacity: 0.85; max-width: 600px; }
.header-date { margin-top: 16px; font-size: 13px; opacity: 0.6; }

/* ---- Nav ---- */
.nav {
  position: sticky;
  top: 0; z-index: 50;
  max-width: 900px;
  margin: 0 auto;
  padding: 0 24px;
}
.nav-inner {
  background: var(--card);
  border-radius: 12px;
  box-shadow: var(--shadow);
  padding: 10px 16px;
  display: flex;
  gap: 4px;
  overflow-x: auto;
  scrollbar-width: none;
}
.nav-inner::-webkit-scrollbar { display: none; }
.nav a {
  display: block;
  padding: 8px 14px;
  text-decoration: none;
  color: var(--text-light);
  font-size: 13px;
  font-weight: 600;
  white-space: nowrap;
  border-radius: 8px;
  transition: all 0.2s;
}
.nav a:hover, .nav a.active { color: var(--primary); background: var(--primary-light); }

/* ---- Main ---- */
.main { max-width: 900px; margin: 0 auto; padding: 24px 24px 80px; }
.section { margin-bottom: 48px; }
.section-header {
  display: flex;
  align-items: center;
  gap: 12px;
  margin-bottom: 20px;
  padding-bottom: 10px;
  border-bottom: 2px solid var(--border);
}
.section-icon {
  width: 36px; height: 36px;
  background: var(--primary);
  color: white;
  border-radius: 10px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 18px;
  flex-shrink: 0;
}
.section-title { font-size: 20px; font-weight: 800; color: var(--primary-dark); }

/* ---- Metrics ---- */
.metrics {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
  gap: 14px;
  margin-bottom: 24px;
}
.metric {
  background: var(--card);
  border-radius: 12px;
  box-shadow: var(--shadow);
  border: 1px solid var(--border);
  padding: 20px;
  text-align: center;
}
.metric .value { font-size: 30px; font-weight: 800; color: var(--primary); line-height: 1.2; }
.metric .label { font-size: 12px; color: var(--text-light); margin-top: 2px; }
.metric .sub { font-size: 11px; color: var(--text-light); margin-top: 4px; }

/* ---- Revenue breakdown ---- */
.breakdown {
  background: var(--card);
  border-radius: var(--radius);
  box-shadow: var(--shadow);
  border: 1px solid var(--border);
  padding: 20px 24px;
  margin-bottom: 24px;
}
.breakdown h5 {
  font-size: 13px;
  font-weight: 700;
  color: var(--text-light);
  margin-bottom: 12px;
  text-transform: uppercase;
  letter-spacing: 0.5px;
}
.breakdown-bar {
  display: flex;
  height: 12px;
  border-radius: 6px;
  overflow: hidden;
  margin-bottom: 14px;
}
.breakdown-bar span { transition: width 0.8s ease; }
.seg-insurance { background: var(--primary); }
.seg-jihi      { background: var(--accent); }
.seg-kyosei    { background: #a855f7; }
.seg-hanpan    { background: #22c55e; }

.breakdown-legend { display: flex; flex-wrap: wrap; gap: 12px; font-size: 12px; }
.legend-item { display: flex; align-items: center; gap: 5px; }
.legend-dot { width: 10px; height: 10px; border-radius: 3px; flex-shrink: 0; }
.legend-amount { font-weight: 700; color: var(--text); }
.legend-label { color: var(--text-light); }

/* ---- Chart ---- */
.chart-wrap {
  background: var(--card);
  border-radius: var(--radius);
  box-shadow: var(--shadow);
  border: 1px solid var(--border);
  padding: 20px 24px;
  overflow-x: auto;
}
.chart-title { font-size: 14px; font-weight: 700; color: var(--primary-dark); margin-bottom: 4px; }
.chart-note  { font-size: 11px; color: var(--text-light); margin-bottom: 16px; }
.chart-bar {
  display: flex;
  align-items: flex-end;
  gap: 5px;
  height: 150px;
  padding-bottom: 4px;
  border-bottom: 1px solid var(--border);
  min-width: 500px;
}
.bar-item {
  flex: 1;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 3px;
  min-width: 28px;
}
.bar {
  width: 100%;
  max-width: 38px;
  background: linear-gradient(180deg, var(--primary), #1aadad);
  border-radius: 4px 4px 0 0;
  margin: 0 auto;
  min-height: 4px;
}
.bar-label { font-size: 10px; color: var(--text-light); white-space: nowrap; }
.bar-value  { font-size: 10px; font-weight: 700; color: var(--primary-dark); }

/* ---- Loading / Error ---- */
.loading {
  text-align: center;
  padding: 48px 24px;
  color: var(--text-light);
  font-size: 14px;
}
.loading::before {
  content: '';
  display: block;
  width: 32px; height: 32px;
  border: 3px solid var(--border);
  border-top-color: var(--primary);
  border-radius: 50%;
  animation: spin 0.8s linear infinite;
  margin: 0 auto 16px;
}
@keyframes spin { to { transform: rotate(360deg); } }
.error-msg {
  background: #fef2f2;
  border: 1px solid #fecaca;
  border-radius: 10px;
  padding: 16px 20px;
  font-size: 13px;
  color: #991b1b;
}

/* ---- Improve List ---- */
.improve-list { list-style: none; padding: 0; }
.improve-list li {
  padding: 12px 16px 12px 40px;
  position: relative;
  border-bottom: 1px solid #f0f0f0;
  font-size: 14px;
}
.improve-list li:last-child { border-bottom: none; }
.improve-list li::before {
  content: '';
  position: absolute;
  left: 12px; top: 16px;
  width: 16px; height: 16px;
  border: 2px solid var(--primary);
  border-radius: 4px;
}
.improve-list li.done::before {
  background: var(--success);
  border-color: var(--success);
  background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 16 16' fill='white' xmlns='http://www.w3.org/2000/svg'%3E%3Cpath d='M13.3 4.3a1 1 0 010 1.4l-6 6a1 1 0 01-1.4 0l-3-3a1 1 0 011.4-1.4L6.5 9.6l5.3-5.3a1 1 0 011.4 0z'/%3E%3C/svg%3E");
  background-size: 12px;
  background-position: center;
  background-repeat: no-repeat;
}
.improve-list li .date { font-size: 11px; color: var(--text-light); margin-left: 8px; }

/* ---- Chatwork ---- */
.cw-table {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: 12px;
  overflow: hidden;
}
.cw-table table { width: 100%; border-collapse: collapse; font-size: 14px; }
.cw-table tr { border-bottom: 1px solid var(--border); }
.cw-table tr:last-child { border-bottom: none; }
.cw-table th {
  padding: 12px 16px;
  font-weight: 700;
  color: var(--primary-dark);
  text-align: left;
  background: var(--primary-light);
}
.cw-table td { padding: 12px 16px; }
.cw-table td a { color: var(--primary); text-decoration: none; font-weight: 600; }
.cw-table td a:hover { text-decoration: underline; }

/* ---- 1on1 ---- */
.oneon1-summary {
  font-size: 13px;
  color: var(--text-light);
  margin-bottom: 16px;
  padding: 10px 16px;
  background: var(--primary-light);
  border-radius: 8px;
  border-left: 3px solid var(--primary);
}
.oneon1-group { margin-bottom: 24px; }
.oneon1-group-title {
  font-size: 13px;
  font-weight: 700;
  color: var(--text-light);
  text-transform: uppercase;
  letter-spacing: 0.5px;
  margin-bottom: 10px;
  padding-bottom: 6px;
  border-bottom: 1px solid var(--border);
}
.oneon1-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(130px, 1fr));
  gap: 10px;
}
.oneon1-card {
  background: var(--card);
  border-radius: 12px;
  border: 1px solid var(--border);
  padding: 14px;
  text-align: center;
  box-shadow: var(--shadow);
}
.oneon1-card.done      { border-color: var(--success); background: #f0fdf4; }
.oneon1-card.scheduled { border-color: var(--accent);  background: var(--accent-light); }
.oneon1-card.pending   { border-color: #ddd; }
.oneon1-name  { font-size: 13px; font-weight: 700; color: var(--primary-dark); margin-bottom: 6px; }
.oneon1-status {
  font-size: 11px; font-weight: 600;
  padding: 2px 8px;
  border-radius: 6px;
  display: inline-block;
}
.done      .oneon1-status { background: #dcfce7; color: #166534; }
.scheduled .oneon1-status { background: #fef3c7; color: #92400e; }
.pending   .oneon1-status { background: #f3f4f6; color: #6b7280; }

/* ---- Footer ---- */
.footer {
  text-align: center;
  padding: 32px 24px;
  font-size: 12px;
  color: var(--text-light);
  border-top: 1px solid var(--border);
  max-width: 900px;
  margin: 0 auto;
}

@media (max-width: 640px) {
  .metrics { grid-template-columns: repeat(2, 1fr); }
}
</style>
</head>

<script>
// ================================================================

    { name: '戸森先生',  role: '常勤歯科医師', status: 'done', date: '3月完了' },
    { name: '瀧村先生',  role: '常勤歯科医師', status: 'done', date: '3月完了' },
    // 非常勤歯科医師
    { name: 'Mut先生',   role: '非常勤歯科医師', status: 'done', date: '3月完了' },
    { name: 'わき先生',  role: '非常勤歯科医師', status: 'done', date: '3月完了' },
    { name: '後藤先生',  role: '非常勤歯科医師', status: 'done', date: '3月完了' },
    { name: '友成先生',  role: '非常勤歯科医師', status: 'done', date: '3月完了' },
    // 矯正歯科医師
    { name: 'けんぱ先生', role: '矯正歯科医師', status: 'done', date: '3月完了' },
    { name: 'mai先生',   role: '矯正歯科医師', status: 'done', date: '3月完了' },
    // 歯科衛生士
    { name: 'ゆたさん',   role: '歯科衛生士', status: 'done', date: '3月完了' },
    { name: 'ゆうりさん', role: '歯科衛生士', status: 'done', date: '3月完了' },
    { name: 'あゆみさん', role: '歯科衛生士', status: 'done', date: '3月完了' },
    { name: 'ひなこさん', role: '歯科衛生士', status: 'done', date: '3月完了' },
    { name: 'めりさん',   role: '歯科衛生士', status: 'done', date: '3月完了' },
    // 歯科助手
    { name: 'さっちゃさん', role: '歯科助手', status: 'done', date: '3月完了' },
    { name: 'みちこさん',   role: '歯科助手', status: 'done', date: '3月完了' },
    { name: 'ちゃみさん',   role: '歯科助手', status: 'done', date: '3月完了' },
    { name: 'まりこさん',   role: '歯科助手', status: 'done', date: '3月完了' },
    { name: 'にきさん',     role: '歯科助手', status: 'done', date: '3月完了' },
    { name: 'かおるさん',   role: '歯科助手', status: 'done', date: '3月完了' },
    // 受付
    { name: 'ましろさん', role: '受付', status: 'done', date: '3月完了' }
  ]
};

// ================================================================
// スプレッドシートID（シートが変わっても変更不要）
// ================================================================
var SHEET_ID = '1c3yPZdER5i4e0syuGkyFabF3cuG7VF_kVZBQ_rNGVL4';

// ================================================================
// Google Sheets → JSONP で取得
// ================================================================
function loadSheetData() {
  var cbName = 'sheetCb_' + Date.now();
  var script = document.createElement('script');

  window[cbName] = function(res) {
    try { parseAndRender(res); }
    catch(e) { renderError('データ解析エラー: ' + e.message); }
    delete window[cbName];
    if (script.parentNode) script.parentNode.removeChild(script);
  };

  script.onerror = function() {
    renderError('スプレッドシートへの接続に失敗しました。インターネット接続を確認してください。');
    delete window[cbName];
  };

  script.src = 'https://docs.google.com/spreadsheets/d/' + SHEET_ID
             + '/gviz/tq?tqx=out:json&callback=' + cbName;
  document.head.appendChild(script);
}

function getNum(row, idx) {
  if (!row.c || !row.c[idx] || row.c[idx].v === null || row.c[idx].v === undefined) return 0;
  var v = row.c[idx].v;
  if (typeof v === 'number') return v;
  return parseFloat(String(v).replace(/,/g, '')) || 0;
}

function parseAndRender(response) {
  var rows = (response.table && response.table.rows) ? response.table.rows : [];
  var daily = [];
  var totalAmount = 0, totalPatients = 0;
  var totalInsurance = 0, totalJihi = 0, totalKyosei = 0, totalHanpan = 0;
  var maxDate = '';

  rows.forEach(function(row) {
    if (!row.c || !row.c[0]) return;
    // gvizはDate型を "Date(yyyy,m,d)" で返すため、表示用の f フィールドを使う
    var dateCell = row.c[0];
    var dateVal = dateCell.f ? String(dateCell.f) : (dateCell.v ? String(dateCell.v) : '');

    // MM/DD 形式のみ処理（ヘッダー行・集計行はスキップ）
    if (!/^\d{2}\/\d{2}$/.test(dateVal)) return;

    var patients  = getNum(row, 2);
    var total     = getNum(row, 12);
    if (patients === 0 && total === 0) return; // 休診日スキップ

    var insurance = getNum(row, 5);
    var jihi      = getNum(row, 7);
    var kyosei    = getNum(row, 9);
    var hanpan    = getNum(row, 11);

    daily.push({ date: dateVal, patients: patients, total: total,
                 insurance: insurance, jihi: jihi, kyosei: kyosei, hanpan: hanpan });
    totalAmount    += total;
    totalPatients  += patients;
    totalInsurance += insurance;
    totalJihi      += jihi;
    totalKyosei    += kyosei;
    totalHanpan    += hanpan;
    maxDate = dateVal;
  });

  renderPerf(daily, totalAmount, totalPatients, totalInsurance, totalJihi, totalKyosei, totalHanpan, maxDate);
}

// ================================================================
// 診療実績レンダリング
// ================================================================
function renderPerf(daily, totalAmount, totalPatients, totalInsurance, totalJihi, totalKyosei, totalHanpan, maxDate) {
  var workDays    = daily.length;
  var avgPatients = workDays > 0 ? Math.round(totalPatients / workDays) : 0;
  var jihiRate    = totalAmount > 0 ? Math.round(totalJihi / totalAmount * 100) : 0;

  var dateLabel = maxDate
    ? DATA.targetMonth + '（' + maxDate + ' 時点）'
    : DATA.targetMonth;
  document.getElementById('headerDate').textContent = '最終データ: ' + dateLabel;
  document.getElementById('footerDate').textContent = 'データ: ' + dateLabel + ' ・スプレッドシートから自動取得';

  // 内訳バー
  var pIns  = totalAmount > 0 ? (totalInsurance / totalAmount * 100).toFixed(1) : 0;
  var pJihi = totalAmount > 0 ? (totalJihi      / totalAmount * 100).toFixed(1) : 0;
  var pKyo  = totalAmount > 0 ? (totalKyosei    / totalAmount * 100).toFixed(1) : 0;
  var pHan  = totalAmount > 0 ? (totalHanpan    / totalAmount * 100).toFixed(1) : 0;

  // 日別チャート
  var maxVal = daily.length > 0 ? Math.max.apply(null, daily.map(function(d){ return d.total; })) : 1;
  var bars = daily.map(function(d) {
    var h = Math.max(6, d.total / maxVal * 120);
    return '<div class="bar-item">'
      + '<div class="bar-value">' + (d.total/10000).toFixed(0) + '万</div>'
      + '<div class="bar" style="height:' + h + 'px"></div>'
      + '<div class="bar-label">' + d.date + '</div>'
      + '</div>';
  }).join('');

  var html = ''

    // --- メトリクス ---
    + '<div class="metrics">'
    + mkMetric('月次売上（累計）', fmtYen(totalAmount), workDays + '診療日分')
    + mkMetric('平均患者数/日',   avgPatients + '人',  workDays + '日の平均')
    + mkMetric('自費率',          jihiRate + '%',      '自費 ' + fmtYenS(totalJihi))
    + mkMetric('矯正売上',        fmtYenS(totalKyosei), '矯正累計')
    + '</div>'

    // --- 内訳バー ---
    + '<div class="breakdown">'
    + '<h5>売上内訳（保険 / 自費 / 矯正 / 物販）</h5>'
    + '<div class="breakdown-bar">'
    + '<span class="seg-insurance" style="width:' + pIns  + '%"></span>'
    + '<span class="seg-jihi"      style="width:' + pJihi + '%"></span>'
    + '<span class="seg-kyosei"    style="width:' + pKyo  + '%"></span>'
    + '<span class="seg-hanpan"    style="width:' + pHan  + '%"></span>'
    + '</div>'
    + '<div class="breakdown-legend">'
    + mkLegend('#0d6e6e', '保険', totalInsurance, pIns)
    + mkLegend('#f0a050', '自費', totalJihi,      pJihi)
    + mkLegend('#a855f7', '矯正', totalKyosei,    pKyo)
    + mkLegend('#22c55e', '物販', totalHanpan,    pHan)
    + '</div>'
    + '</div>'

    // --- 日別チャート ---
    + '<div class="chart-wrap">'
    + '<div class="chart-title">日別売上推移（' + DATA.targetMonth + '）</div>'
    + '<div class="chart-note">※ 保険＋自費＋矯正＋物販の合計　　患者0人の日（休診）は除外</div>'
    + '<div class="chart-bar">'
    + (bars || '<div style="padding:24px;color:var(--text-light);font-size:13px;">データがありません</div>')
    + '</div>'
    + '</div>';

  document.getElementById('perfContent').innerHTML = html;
}

function mkMetric(label, value, sub) {
  return '<div class="metric">'
    + '<div class="label">' + label + '</div>'
    + '<div class="value">' + value + '</div>'
    + '<div class="sub">'   + sub   + '</div>'
    + '</div>';
}

function mkLegend(color, label, amount, pct) {
  return '<div class="legend-item">'
    + '<div class="legend-dot" style="background:' + color + '"></div>'
    + '<span class="legend-label">' + label + '</span>'
    + '<span class="legend-amount">' + fmtYenS(amount) + '</span>'
    + '<span class="legend-label">(' + pct + '%)</span>'
    + '</div>';
}

function fmtYen(n) {
  if (n >= 1000000) return (n / 10000).toFixed(0) + '万円';
  if (n >= 10000)   return (n / 10000).toFixed(1) + '万円';
  return n.toLocaleString() + '円';
}

function fmtYenS(n) {
  if (n >= 10000) return (n / 10000).toFixed(1) + '万円';
  return n.toLocaleString() + '円';
}

function renderError(msg) {
  document.getElementById('perfContent').innerHTML =
    '<div class="error-msg">⚠️ ' + msg + '</div>';
  document.getElementById('headerDate').textContent = DATA.targetMonth;
  document.getElementById('footerDate').textContent = DATA.targetMonth;
}

// ================================================================
// 取り組み内容レンダリング
// ================================================================
function renderImprove() {
  var el = document.getElementById('improveList');
  el.innerHTML = DATA.improveItems.map(function(item) {
    return '<li class="' + (item.done ? 'done' : '') + '">'
      + item.text
      + (item.date ? '<span class="date">' + item.date + '</span>' : '')
      + '</li>';
  }).join('');
}

// ================================================================
// 1on1レンダリング
// ================================================================
function renderOneon1() {
  var doneCount = DATA.oneon1.filter(function(s){ return s.status === 'done'; }).length;
  document.getElementById('oneon1Summary').textContent =
    DATA.targetMonth + ' — ' + doneCount + ' / ' + DATA.oneon1.length + '名 完了';

  var groups = [
    { label: '歯科医師（院長・常勤・非常勤・矯正）',
      roles: ['院長', '常勤歯科医師', '非常勤歯科医師', '矯正歯科医師'] },
    { label: '歯科衛生士',
      roles: ['歯科衛生士'] },
    { label: '歯科助手・受付',
      roles: ['歯科助手', '受付'] }
  ];

  var html = '';
  groups.forEach(function(group) {
    var members = DATA.oneon1.filter(function(s){
      return group.roles.indexOf(s.role) !== -1;
    });
    if (!members.length) return;

    html += '<div class="oneon1-group">'
          + '<div class="oneon1-group-title">' + group.label + '</div>'
          + '<div class="oneon1-grid">';

    members.forEach(function(m) {
      var statusText = m.status === 'done'      ? '✓ ' + (m.date || '完了')
                     : m.status === 'scheduled' ? '📅 ' + (m.date || '予定あり')
                     : '未実施';
      html += '<div class="oneon1-card ' + m.status + '">'
            + '<div class="oneon1-name">' + m.name + '</div>'
            + '<div class="oneon1-status">' + statusText + '</div>'
            + '</div>';
    });

    html += '</div></div>';
  });

  document.getElementById('oneon1Grid').innerHTML = html;
}

// ================================================================
// ナビゲーション
// ================================================================
function initNav() {
  var secs  = document.querySelectorAll('.section[id]');
  var links = document.querySelectorAll('.nav a');

  window.addEventListener('scroll', function() {
    var cur = '';
    secs.forEach(function(s) {
      if (window.scrollY >= s.offsetTop - 80) cur = s.id;
    });
    links.forEach(function(a) {
      var active = a.getAttribute('href') === '#' + cur;
      a.style.background = active ? 'var(--primary-light)' : '';
      a.style.color      = active ? 'var(--primary)' : '';
    });
  });

  links.forEach(function(a) {
    a.addEventListener('click', function(e) {
      e.preventDefault();
      var target = document.querySelector(a.getAttribute('href'));
      if (target) target.scrollIntoView({ behavior: 'smooth' });
    });
  });
}

// ================================================================
// 初期化
// ================================================================
renderImprove();
renderOneon1();
initNav();
loadSheetData();
</script>

</body>
</html>
